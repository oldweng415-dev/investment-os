name: Daily OS Update
on:
  schedule:
    - cron: '30 22 * * *' # 每天早上 06:30 (台灣時間) 執行
  workflow_dispatch:      # 允許手動點擊執行

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy pandas-datareader requests scipy
          
      - name: Run OS Engine
        run: python investment_os_production.py
        
      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add output/latest_signals.json || true
          git add data/ || true
          git commit -m "Update OS signals: $(date)" || true
          git pull --rebase origin main
          git push
