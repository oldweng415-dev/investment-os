name: Daily OS Update

on:
  schedule:
    # UTC 22:30 = 台灣時間隔日 06:30
    - cron: "30 22 * * *"

  workflow_dispatch:

  # 修改前端或主程式後自動重新產生與部署。
  # output/** 不在 paths 內，因此 Actions 自己寫回 output 時不會無限觸發。
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "investment_os_production.py"
      - "requirements.txt"
      - "collectors/**"
      - ".github/workflows/daily_update.yml"

concurrency:
  group: investment-os-main-and-pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      INVESTMENT_OS_DATA_MODE: live_public
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
      CFTC_APP_TOKEN: ${{ secrets.CFTC_APP_TOKEN }}
      OPTIONS_UNDERLYING: QQQ
      OPTIONS_TARGET_DTE: "30"

    steps:
      # ======================================================
      # 1. Checkout main
      # ======================================================
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      # ======================================================
      # 2. 執行前同步最新 main
      # ======================================================
      - name: Sync latest main
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git reset --hard origin/main

      # ======================================================
      # 3. Python
      # ======================================================
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      # ======================================================
      # 4. 安裝套件
      # ======================================================
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "beautifulsoup4>=4.12" "lxml>=5.0" "pandas-market-calendars>=4.4"

      # ======================================================
      # 5. 還原 FRED 快取
      # ======================================================
      - name: Restore FRED data cache
        uses: actions/cache@v4
        with:
          path: data/cache
          key: fred-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            fred-data-${{ runner.os }}-

      # ======================================================
      # 6. 驗證外部資料設定
      # ======================================================
      - name: Verify external data configuration
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${FRED_API_KEY:-}" ]; then
            echo "::error::FRED_API_KEY is empty or unavailable."
            exit 1
          fi

          if [ -z "${SEC_USER_AGENT:-}" ]; then
            echo "::error::SEC_USER_AGENT is empty or unavailable."
            echo "Create it under Settings → Secrets and variables → Actions → Variables."
            exit 1
          fi

          echo "FRED_API_KEY is configured."
          echo "SEC_USER_AGENT is configured."

      # ======================================================
      # 7. 收集並驗證免費公開 PIT 資料
      # ======================================================
      - name: Collect and validate free public PIT data
        shell: bash
        run: |
          set -euo pipefail

          echo "Working directory:"
          pwd

          python -m py_compile collectors/collect_free_data.py
          python -u collectors/collect_free_data.py

          if [ ! -s "data/valuation_pit.csv" ]; then
            echo "::error::data/valuation_pit.csv was not generated."
            exit 1
          fi

          python - <<'PY'
          from pathlib import Path
          import pandas as pd

          schemas = {
              "data/valuation_pit.csv": {
                  "observation_date",
                  "release_timestamp",
                  "effective_trade_date",
                  "asset",
                  "metric",
                  "value",
                  "score",
                  "source",
                  "is_proxy",
              },
              "data/macro_nowcast_pit.csv": {
                  "observation_date",
                  "release_timestamp",
                  "effective_trade_date",
                  "metric",
                  "value",
                  "score",
                  "source",
                  "is_proxy",
              },
              "data/positioning_pit.csv": {
                  "observation_date",
                  "release_timestamp",
                  "effective_trade_date",
                  "metric",
                  "value",
                  "score",
                  "source",
                  "is_proxy",
              },
              "data/ai_cycle_pit.csv": {
                  "observation_date",
                  "release_timestamp",
                  "effective_trade_date",
                  "company",
                  "metric",
                  "value",
                  "score",
                  "source",
                  "is_proxy",
              },
              "data/events.csv": {
                  "event_date",
                  "asset",
                  "event_type",
                  "description",
                  "source",
              },
          }

          for filename, required in schemas.items():
              path = Path(filename)

              if not path.exists():
                  print(f"WARNING: {filename} was not collected this run.")
                  continue

              frame = pd.read_csv(path)
              missing = required - set(frame.columns)

              if missing:
                  raise AssertionError(
                      f"{filename} missing columns: {sorted(missing)}"
                  )

              if frame.empty:
                  raise AssertionError(f"{filename} is empty")

              print(f"{filename}: {len(frame)} rows")
              print(frame.tail(5).to_string(index=False))

          valuation = pd.read_csv("data/valuation_pit.csv")
          required_valuation_metrics = {
              "trailing_pe",
              "earnings_yield",
              "fcf_yield",
              "erp",
          }
          actual_valuation_metrics = set(
              valuation["metric"].dropna().astype(str).str.lower()
          )

          missing_metrics = (
              required_valuation_metrics
              - actual_valuation_metrics
          )

          if missing_metrics:
              raise AssertionError(
                  "valuation_pit.csv missing metrics: "
                  f"{sorted(missing_metrics)}"
              )

          positioning_path = Path(
              "data/positioning_pit.csv"
          )

          if positioning_path.exists():
              positioning = pd.read_csv(
                  positioning_path
              )

              put_call = positioning[
                  positioning["metric"]
                  .astype(str)
                  .str.lower()
                  .eq("equity_put_call")
              ].copy()

              if not put_call.empty:
                  put_call[
                      "release_timestamp"
                  ] = pd.to_datetime(
                      put_call[
                          "release_timestamp"
                      ],
                      errors="coerce",
                      utc=True,
                  )

                  put_call = put_call.sort_values(
                      "release_timestamp"
                  )

                  latest_put_call = (
                      put_call.iloc[-1]
                  )

                  observation_date = pd.Timestamp(
                      latest_put_call[
                          "observation_date"
                      ]
                  )

                  effective_date = pd.Timestamp(
                      latest_put_call[
                          "effective_trade_date"
                      ]
                  )

                  age_days = (
                      effective_date
                      - observation_date
                  ).days

                  if not 0 <= age_days <= 10:
                      raise AssertionError(
                          "Latest Equity Put/Call row "
                          "has an invalid date gap: "
                          f"observation={observation_date.date()}, "
                          f"effective={effective_date.date()}, "
                          f"gap={age_days}"
                      )

          events_path = Path(
              "data/events.csv"
          )

          if events_path.exists():
              events = pd.read_csv(
                  events_path
              )

              fomc = events[
                  events["event_type"]
                  .astype(str)
                  .str.lower()
                  .isin(
                      [
                          "fomc",
                          "fed",
                      ]
                  )
                  & events[
                      "description"
                  ]
                  .astype(str)
                  .str.contains(
                      "FOMC",
                      case=False,
                      na=False,
                  )
              ].copy()

              if not fomc.empty:
                  fomc[
                      "event_date"
                  ] = pd.to_datetime(
                      fomc[
                          "event_date"
                      ],
                      errors="coerce",
                  )

                  if fomc[
                      "event_date"
                  ].duplicated().any():
                      raise AssertionError(
                          "Duplicate FOMC decision "
                          "dates were generated."
                      )

                  per_year = (
                      fomc.dropna(
                          subset=[
                              "event_date"
                          ]
                      )
                      .assign(
                          year=lambda x:
                              x["event_date"].dt.year
                      )
                      .groupby(
                          "year"
                      )
                      .size()
                  )

                  if (
                      per_year > 10
                  ).any():
                      raise AssertionError(
                          "Too many FOMC decision "
                          f"dates in one year: {per_year.to_dict()}"
                      )


          valuation["release_timestamp"] = pd.to_datetime(
              valuation["release_timestamp"],
              errors="coerce",
              utc=True,
          )

          latest_valuation = (
              valuation.sort_values(
                  "release_timestamp"
              )
              .iloc[-1]
          )

          latest_valuation_source = str(
              latest_valuation.get(
                  "source",
                  "",
              )
          ).upper()

          if "TTM" not in latest_valuation_source:
              print(
                  "WARNING: latest valuation row is not yet "
                  "the SEC TTM implementation:",
                  latest_valuation_source,
              )

          nowcast_path = Path(
              "data/macro_nowcast_pit.csv"
          )

          if nowcast_path.exists():
              nowcast = pd.read_csv(
                  nowcast_path
              )

              nowcast["release_timestamp"] = pd.to_datetime(
                  nowcast["release_timestamp"],
                  errors="coerce",
                  utc=True,
              )

              if nowcast[
                  "release_timestamp"
              ].isna().all():
                  raise AssertionError(
                      "GDPNow has no usable vintage timestamps"
                  )

          if positioning_path.exists():
              positioning_metrics = set(
                  positioning["metric"]
                  .dropna()
                  .astype(str)
                  .str.lower()
              )

              for expected_metric in (
                  "cftc_positioning",
                  "iv30",
                  "rv20",
              ):
                  if expected_metric not in positioning_metrics:
                      print(
                          "WARNING: positioning metric unavailable:",
                          expected_metric,
                      )

              if {
                  "iv30",
                  "rv20",
              }.issubset(positioning_metrics):
                  latest_volatility = (
                      positioning[
                          positioning["metric"]
                          .astype(str)
                          .str.lower()
                          .isin(
                              [
                                  "iv30",
                                  "rv20",
                              ]
                          )
                      ]
                      .sort_values(
                          "release_timestamp"
                      )
                      .groupby(
                          "metric"
                      )
                      .tail(1)
                  )

                  volatility_values = pd.to_numeric(
                      latest_volatility["value"],
                      errors="coerce",
                  )

                  if (
                      volatility_values.isna().any()
                      or not volatility_values.between(
                          0,
                          500,
                          inclusive="neither",
                      ).all()
                  ):
                      raise AssertionError(
                          "IV30/RV20 values are outside "
                          "plausible bounds"
                      )

          if events_path.exists():
              event_sources = set(
                  events["source"]
                  .dropna()
                  .astype(str)
                  .str.upper()
              )

              if "BEA_RELEASE_SCHEDULE" not in event_sources:
                  print(
                      "WARNING: BEA release schedule unavailable; "
                      "event check should report partial status."
                  )

          ai_path = Path(
              "data/ai_cycle_pit.csv"
          )

          if ai_path.exists():
              ai = pd.read_csv(
                  ai_path
              )

              latest_ai = (
                  ai.sort_values(
                      "release_timestamp"
                  )
                  .groupby(
                      "metric"
                  )
                  .tail(1)
              )

              ai_scores = pd.to_numeric(
                  latest_ai["score"],
                  errors="coerce",
              )

              if (
                  ai_scores.dropna() > 99.9
              ).any():
                  print(
                      "WARNING: AI proxy score remains "
                      "extremely saturated:",
                      latest_ai[
                          [
                              "metric",
                              "value",
                              "score",
                          ]
                      ].to_dict(
                          "records"
                      ),
                  )

          print("Nine-item collector validation passed.")

          print("Put/Call and event-date validation passed.")
          print("Free public PIT validation completed.")
          PY

      # ======================================================
      # 8. 保存免費 PIT 歷史
      # ======================================================
      - name: Commit collected PIT data
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          for file in \
            data/valuation_pit.csv \
            data/macro_nowcast_pit.csv \
            data/positioning_pit.csv \
            data/ai_cycle_pit.csv \
            data/events.csv
          do
            if [ -f "$file" ]; then
              git add "$file"
            fi
          done

          if git diff --cached --quiet; then
            echo "No PIT data changes."
          else
            git commit \
              -m "Update free public PIT data [skip ci]"

            git push origin HEAD:main
          fi

      # ======================================================
      # 7. 驗證原始檔案
      # ======================================================
      - name: Validate source files
        shell: bash
        run: |
          set -euo pipefail

          test -f investment_os_production.py || {
            echo "ERROR: investment_os_production.py does not exist."
            exit 1
          }

          test -f requirements.txt || {
            echo "ERROR: requirements.txt does not exist."
            exit 1
          }

          test -f site/index.html || {
            echo "ERROR: site/index.html does not exist."
            exit 1
          }

          python -m py_compile investment_os_production.py
          python -m py_compile collectors/collect_free_data.py
          echo "Source validation passed."

      # ======================================================
      # 8. 執行 Investment OS
      # ======================================================
      - name: Run OS Engine
        shell: bash
        run: |
          set -euo pipefail
          python investment_os_production.py
      #=======================================================
      - name: Validate score and date alignment
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          from pathlib import Path

          import pandas as pd

          with open(
              "output/latest_signals.json",
              "r",
              encoding="utf-8",
          ) as handle:
              payload = json.load(handle)

          # 1. Margin Score 不可因 Carry NaN 而消失
          margin_score = payload[
              "scores"
          ]["Margin_Score"]

          if margin_score is None:
              raise AssertionError(
                  "Margin_Score is still null."
              )

          # 2. decision_date 必須晚於 signal_date
          signal_date = pd.Timestamp(
              payload["signal_date"]
          )

          decision_date = pd.Timestamp(
              payload["decision_date"]
          )

          if decision_date <= signal_date:
              raise AssertionError(
                  "decision_date must be after signal_date."
              )

          # 3. 若 Valuation available，四項 raw 不可全為 null
          valuation_available = (
              payload[
                  "modules"
              ]["Valuation"]
              is not None
          )

          valuation_raw_keys = [
              "valuation.trailing_pe",
              "valuation.fcf_yield",
              "valuation.earnings_yield",
              "valuation.erp",
          ]

          valuation_values = [
              payload[
                  "raw_indicators"
              ].get(key)
              for key in valuation_raw_keys
          ]

          if (
              valuation_available
              and all(
                  value is None
                  for value in valuation_values
              )
          ):
              raise AssertionError(
                  "Valuation is available but raw values are null."
              )

          # 4. NFL 必須使用同一日期的三個組成
          raw = payload["raw_indicators"]

          walcl = raw.get(
              "liquidity.walcl_bn"
          )
          tga = raw.get(
              "liquidity.tga_bn"
          )
          rrp = raw.get(
              "liquidity.rrp_bn"
          )
          nfl = raw.get(
              "liquidity.net_fed_liquidity_bn"
          )

          if None not in (
              walcl,
              tga,
              rrp,
              nfl,
          ):
              expected_nfl = (
                  walcl
                  - tga
                  - rrp
              )

              difference = abs(
                  nfl
                  - expected_nfl
              )

              if difference > 0.001:
                  raise AssertionError(
                      "NFL formula mismatch: "
                      f"actual={nfl}, "
                      f"expected={expected_nfl}, "
                      f"difference={difference}"
                  )

          print(
              "Score and date alignment validation passed."
          )
          print(
              "Signal date:",
              payload["signal_date"],
          )
          print(
              "Decision date:",
              payload["decision_date"],
          )
          print(
              "Margin Score:",
              margin_score,
          )
          print(
              "Valuation:",
              payload["modules"]["Valuation"],
          )
          PY

      # ======================================================
      # 9. 驗證輸出
      # ======================================================
      - name: Validate output
        shell: bash
        run: |
          set -euo pipefail

          REQUIRED_NONEMPTY_FILES=(
            "output/latest_signals.json"
            "output/score_history.csv"
            "output/module_data_quality.csv"
            "output/raw_indicator_snapshot.csv"
          )

          for file in "${REQUIRED_NONEMPTY_FILES[@]}"; do
            if [ ! -s "$file" ]; then
              echo "ERROR: Required output is missing or empty: $file"
              find output -maxdepth 2 -type f -print 2>/dev/null | sort || true
              exit 1
            fi
          done

          # warnings.log 可以是空檔，但必須存在。
          if [ ! -f "output/warnings.log" ]; then
            echo "ERROR: output/warnings.log was not generated."
            exit 1
          fi

          python -m json.tool output/latest_signals.json > /dev/null

          python - <<'PY'
          import json
          from pathlib import Path

          import pandas as pd

          output_dir = Path("output")

          with (output_dir / "latest_signals.json").open(
              "r",
              encoding="utf-8",
          ) as handle:
              payload = json.load(handle)

          required_json_keys = {
              "signal_date",
              "decision_date",
              "generated_at",
              "data_mode",
              "scores",
              "modules",
              "allocation",
              "covered_call",
              "effective_module_weights",
              "data_quality",
              "risk_overrides",
              "decision_reasons",
              "raw_indicators",
          }

          missing_json_keys = required_json_keys - set(payload)
          if missing_json_keys:
              raise AssertionError(
                  "latest_signals.json missing keys: "
                  f"{sorted(missing_json_keys)}"
              )

          required_scores = {
              "Buy_Score",
              "Risk_Score",
              "Margin_Score",
          }
          missing_scores = required_scores - set(payload.get("scores", {}))
          if missing_scores:
              raise AssertionError(
                  f"scores missing keys: {sorted(missing_scores)}"
              )

          required_modules = {
              "Market_Regime",
              "AI_Cycle",
              "Valuation",
              "Macro",
              "Liquidity",
              "Positioning",
          }
          missing_modules = required_modules - set(payload.get("modules", {}))
          if missing_modules:
              raise AssertionError(
                  f"modules missing keys: {sorted(missing_modules)}"
              )

          history = pd.read_csv(output_dir / "score_history.csv")
          required_history_columns = {
              "date",
              "Market_Regime",
              "AI_Cycle",
              "Valuation",
              "Macro",
              "Liquidity",
              "Positioning",
              "Buy_Score",
              "Risk_Score",
              "Margin_Score",
              "Target_Margin_Pct",
              "Coverage_Ratio",
          }
          missing_history = required_history_columns - set(history.columns)
          if missing_history:
              raise AssertionError(
                  "score_history.csv missing columns: "
                  f"{sorted(missing_history)}"
              )

          quality = pd.read_csv(output_dir / "module_data_quality.csv")
          required_quality_columns = {
              "signal_date",
              "module",
              "score",
              "available",
              "coverage",
              "is_proxy",
              "missing_inputs",
              "stale_inputs",
          }
          missing_quality = required_quality_columns - set(quality.columns)
          if missing_quality:
              raise AssertionError(
                  "module_data_quality.csv missing columns: "
                  f"{sorted(missing_quality)}"
              )

          allocation = payload.get("allocation", {})
          scores = payload.get("scores", {})
          modules = payload.get("modules", {})
          data_quality = payload.get("data_quality", {})

          target_margin = allocation.get("Target_Margin_Pct")
          risk_score = scores.get("Risk_Score")
          liquidity_score = modules.get("Liquidity")
          margin_score = scores.get("Margin_Score")
          coverage = data_quality.get("coverage_ratio")

          if target_margin is None:
              raise AssertionError("Target_Margin_Pct is missing")

          assert 0 <= target_margin <= 20

          if risk_score is not None and risk_score > 70:
              assert target_margin == 0

          if liquidity_score is not None and liquidity_score < 30:
              assert target_margin == 0

          if margin_score is not None and margin_score < 45:
              assert target_margin == 0

          if coverage is not None and coverage < 0.60:
              assert target_margin == 0

          # --------------------------------------------------
          # Carry 單位合理性驗證
          # --------------------------------------------------
          modifiers = payload.get(
              "modifiers",
              {},
          )

          spread = modifiers.get(
              "expected_return_spread_pct_points"
          )

          carry_score = scores.get(
              "Carry_Score"
          )

          if spread is not None:
              if not isinstance(
                  spread,
                  (int, float),
              ):
                  raise AssertionError(
                      "expected_return_spread_pct_points "
                      f"must be numeric or null: {spread}"
                  )

              if abs(spread) > 30:
                  raise AssertionError(
                      "Expected return spread has a likely "
                      f"unit conversion error: {spread}"
                  )

          if carry_score is not None:
              if not 0 <= carry_score <= 100:
                  raise AssertionError(
                      "Carry_Score out of range: "
                      f"{carry_score}"
                  )

          print("Carry validation passed.")
          print(
              "Expected return spread:",
              spread,
          )
          print(
              "Carry Score:",
              carry_score,
          )


          event_calendar = data_quality.get(
              "event_calendar",
              {},
          )

          if not isinstance(
              event_calendar,
              dict,
          ):
              raise AssertionError(
                  "data_quality.event_calendar must be an object"
              )

          if event_calendar.get(
              "status"
          ) not in {
              "complete",
              "partial",
              "unavailable",
          }:
              raise AssertionError(
                  "Invalid event calendar status: "
                  f"{event_calendar}"
              )

          covered_call = payload.get(
              "covered_call",
              {},
          )

          required_cc_fields = {
              "status",
              "reason",
              "options_data_available",
              "iv30_pct",
              "rv20_pct",
              "iv_minus_rv_pct_points",
              "strike_recommendation_available",
          }

          missing_cc_fields = (
              required_cc_fields
              - set(
                  covered_call
              )
          )

          if missing_cc_fields:
              raise AssertionError(
                  "covered_call missing fields: "
                  f"{sorted(missing_cc_fields)}"
              )

          if covered_call.get(
              "options_data_available"
          ):
              iv30 = covered_call.get(
                  "iv30_pct"
              )

              rv20 = covered_call.get(
                  "rv20_pct"
              )

              if (
                  iv30 is None
                  or rv20 is None
                  or not 0 < iv30 < 500
                  or not 0 < rv20 < 500
              ):
                  raise AssertionError(
                      "Options data flag is true but "
                      "IV30/RV20 are invalid"
                  )

              if covered_call.get(
                  "strike_recommendation_available"
              ):
                  raise AssertionError(
                      "Free yfinance proxy must not enable "
                      "an exact strike recommendation"
                  )

          module_quality = payload.get(
              "module_data_quality",
              {},
          )

          for module_name in (
              "market_regime",
              "macro",
              "liquidity",
          ):
              quality_record = module_quality.get(
                  module_name,
                  {},
              )

              if "missing_inputs" not in quality_record:
                  raise AssertionError(
                      f"{module_name} missing component diagnostics"
                  )

          print("Nine-item output validation passed.")

          print("JSON and CSV validation passed.")
          print("Signal date:", payload["signal_date"])
          print("Scores:", payload["scores"])
          print("Allocation:", payload["allocation"])
          PY

      # ======================================================
      # 10. 將 output 寫回 main
      # ======================================================
      - name: Commit and push output to main
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf /tmp/investment-os-output
          mkdir -p /tmp/investment-os-output
          cp -a output/. /tmp/investment-os-output/

          for attempt in 1 2 3; do
            echo "Commit/push attempt ${attempt}/3"

            git fetch origin main
            git reset --hard origin/main

            mkdir -p output
            cp -a /tmp/investment-os-output/. output/
            git add output/

            if git diff --cached --quiet; then
              echo "No output changes detected."
              break
            fi

            git commit -m "Update OS signals: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

            if git push origin HEAD:main; then
              echo "Push to main completed successfully."
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "ERROR: Push to main failed after 3 attempts."
              exit 1
            fi

            echo "Remote main changed. Retrying..."
            sleep $((attempt * 3))
          done

          # reset/commit 過程後，重新放回本次輸出供 Pages 使用。
          mkdir -p output
          cp -a /tmp/investment-os-output/. output/

      # ======================================================
      # 11. 從 main/site 建立 Pages Artifact
      # ======================================================
      - name: Prepare GitHub Pages site
        shell: bash
        run: |
          set -euo pipefail

          rm -rf /tmp/pages-site
          mkdir -p /tmp/pages-site/output

          # 前端原始碼由 main/site 維護，不再讀取 gh-pages 舊資產。
          cp -a site/. /tmp/pages-site/

          # 首頁以同來源相對路徑讀取這一份。
          cp output/latest_signals.json /tmp/pages-site/latest_signals.json

          # 保留完整資料檔供查閱或未來擴充圖表。
          cp output/latest_signals.json /tmp/pages-site/output/latest_signals.json
          cp output/score_history.csv /tmp/pages-site/output/score_history.csv
          cp output/module_data_quality.csv /tmp/pages-site/output/module_data_quality.csv
          cp output/raw_indicator_snapshot.csv /tmp/pages-site/output/raw_indicator_snapshot.csv

          touch /tmp/pages-site/.nojekyll

          test -s /tmp/pages-site/index.html
          python -m json.tool /tmp/pages-site/latest_signals.json > /dev/null

          echo "Pages artifact files:"
          find /tmp/pages-site -maxdepth 3 -type f | sort

      # ======================================================
      # 12. 設定與部署 GitHub Pages
      # ======================================================
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: /tmp/pages-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
