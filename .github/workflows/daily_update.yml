name: Daily OS Update

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

concurrency:
  group: investment-os-main-writer
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install \
            yfinance \
            pandas \
            numpy \
            pandas-datareader \
            requests \
            scipy

      - name: Sync latest main
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git reset --hard origin/main

      - name: Run OS Engine
        shell: bash
        run: |
          set -euo pipefail
          python investment_os_production.py

      - name: Validate output
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "output/latest_signals.json" ]; then
            echo "ERROR: output/latest_signals.json was not generated."
            find . -maxdepth 3 -type f | sort
            exit 1
          fi

          python -m json.tool output/latest_signals.json > /dev/null
          echo "Output validation passed."

      - name: Commit and Push
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf /tmp/investment-os-output
          mkdir -p /tmp/investment-os-output
          cp -a output/. /tmp/investment-os-output/

          for attempt in 1 2 3; do
            echo "Commit/push attempt ${attempt}/3"

            git fetch origin main
            git reset --hard origin/main

            mkdir -p output
            cp -a /tmp/investment-os-output/. output/

            git add output/

            if git diff --cached --quiet; then
              echo "No output changes detected."
              exit 0
            fi

            git commit \
              -m "Update OS signals: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

            if git push origin HEAD:main; then
              echo "Push completed successfully."
              exit 0
            fi

            sleep $((attempt * 3))
          done

          echo "ERROR: Push failed after 3 attempts."
          exit 1
